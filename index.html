<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>实时聊天室</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
</head>
<body>
  <div class="chat-app">
    <div class="chat-header">
      <h1>实时聊天室</h1>
      <div>
        <button id="add-friend-btn" class="header-btn">添加好友</button>
        <button id="friend-requests-btn" class="header-btn">好友请求 <span id="request-badge" class="badge" style="display:none">0</span></button>
        <button id="settings-btn" class="header-btn">设置</button>
        <button id="create-group-btn" class="header-btn">创建群聊</button>
      </div>
    </div>
    <div class="chat-container">
      <div class="chat-sidebar" id="chat-sidebar">
        <h2>聊天</h2>
        <div class="sidebar-section">
          <h3>群聊</h3>
          <div id="group-chats"></div>
        </div>
        <div class="sidebar-section">
          <h3>好友</h3>
          <div id="friends-list"></div>
        </div>
      </div>
      <div class="chat-main">
        <!-- 群聊信息栏 -->
        <div class="group-info-bar" id="group-info-bar" style="display:none">
          <div class="group-info-left">
            <span class="group-info-name" id="group-info-name"></span>
            <span class="group-info-count" id="group-info-count"></span>
          </div>
          <div class="group-info-actions">
            <button class="group-action-btn" id="toggle-mgmt-btn">⚙️ 群管理</button>
          </div>
        </div>
        <!-- 群管理面板（折叠） -->
        <div class="group-mgmt-panel" id="group-mgmt-panel" style="display:none">
          <div class="mgmt-section">
            <h4>👥 群成员 <span id="mgmt-member-count"></span></h4>
            <div id="mgmt-members-list" class="mgmt-members-list"></div>
          </div>
          <div class="mgmt-section" id="mgmt-invite-section">
            <h4>➕ 邀请好友</h4>
            <div id="mgmt-invite-list" class="mgmt-members-list"></div>
          </div>
          <div class="mgmt-section mgmt-danger" id="mgmt-delete-section" style="display:none">
            <h4>🗑️ 危险操作</h4>
            <button class="group-action-btn group-delete-btn" id="delete-group-btn">删除此群聊</button>
          </div>
        </div>
        <div class="chat-messages" id="chat-messages"></div>
        <div class="chat-input-area" id="chat-input-area">
          <input type="text" class="chat-input" id="chat-input" placeholder="输入消息...">
          <button class="emoji-btn" id="emoji-btn">😊</button>
          <button class="send-btn" id="send-btn">发送</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 表情选择器 -->
  <div class="emoji-picker" id="emoji-picker"></div>

  <!-- 添加好友模态框 -->
  <div class="modal" id="add-friend-modal">
    <div class="modal-content">
      <h2>添加好友</h2>
      <div class="search-container" style="margin-bottom:15px">
        <input type="text" id="friend-search-input" placeholder="输入用户名搜索...">
        <button id="friend-search-btn" class="modal-btn create" style="border-radius:0 5px 5px 0;margin:0;padding:10px 15px">搜索</button>
      </div>
      <div id="friend-search-results" class="friend-search-results"></div>
      <div class="modal-buttons" style="margin-top:15px">
        <button class="modal-btn cancel" id="cancel-add-friend">关闭</button>
      </div>
    </div>
  </div>

  <!-- 好友请求模态框 -->
  <div class="modal" id="friend-requests-modal">
    <div class="modal-content">
      <h2>好友请求</h2>
      <div id="friend-requests-list" class="friend-requests-list"></div>
      <div class="modal-buttons" style="margin-top:15px">
        <button class="modal-btn cancel" id="cancel-friend-requests">关闭</button>
      </div>
    </div>
  </div>

  <!-- 创建群聊模态框 -->
  <div class="modal" id="group-modal">
    <div class="modal-content" style="max-width:450px">
      <h2>创建群聊</h2>
      <input type="text" id="group-name" placeholder="输入群聊名称">
      <h3 style="font-size:14px;color:#6c757d;margin-bottom:10px">选择好友加入群聊</h3>
      <div id="group-friend-list" class="group-friend-list"></div>
      <div class="modal-buttons" style="margin-top:15px">
        <button class="modal-btn cancel" id="cancel-group">取消</button>
        <button class="modal-btn create" id="create-group-submit">创建</button>
      </div>
    </div>
  </div>

  <!-- 已读未读详情模态框 -->
  <div class="modal" id="read-status-modal">
    <div class="modal-content" style="max-width:380px">
      <h2>消息已读状态</h2>
      <div class="read-status-sections">
        <div class="read-status-section">
          <h3 class="read-label read-label-done">✅ 已读 <span id="read-count-display">0</span> 人</h3>
          <div id="read-members-list" class="read-members-list"></div>
        </div>
        <div class="read-status-section">
          <h3 class="read-label read-label-pending">⏳ 未读 <span id="unread-count-display">0</span> 人</h3>
          <div id="unread-members-list" class="read-members-list"></div>
        </div>
      </div>
      <div class="modal-buttons" style="margin-top:15px">
        <button class="modal-btn cancel" id="cancel-read-status">关闭</button>
      </div>
    </div>
  </div>

  <!-- 删除确认模态框 -->
  <div class="modal" id="delete-confirm-modal">
    <div class="modal-content" style="max-width:350px;text-align:center">
      <h2 style="color:#dc3545">⚠️ 删除群聊</h2>
      <p style="margin-bottom:20px;color:#555">确定要删除这个群聊吗？<br>所有消息将被清除，<strong>此操作不可撤销</strong>。</p>
      <div class="modal-buttons" style="justify-content:center">
        <button class="modal-btn cancel" id="cancel-delete">取消</button>
        <button class="modal-btn" id="confirm-delete" style="background:#dc3545;color:white">确认删除</button>
      </div>
    </div>
  </div>

  <!-- 设置模态框 -->
  <div class="modal" id="settings-modal">
    <div class="modal-content">
      <h2>个人设置</h2>
      <div class="avatar-section">
        <div class="avatar-preview" id="avatar-preview">
          <img id="avatar-img" src="https://via.placeholder.com/100" alt="头像">
        </div>
        <input type="file" id="avatar-upload" accept="image/*">
        <label for="avatar-upload">上传头像</label>
      </div>
      <input type="text" id="nickname-input" placeholder="输入新昵称">
      <div class="modal-buttons">
        <button class="modal-btn cancel" id="cancel-settings">取消</button>
        <button class="modal-btn create" id="save-settings">保存</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
